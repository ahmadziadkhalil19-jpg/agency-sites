<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrared Heated Eye Mask</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #0A0A0F;
            color: #fff;
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
        }
        .hero {
            position: relative;
            height: 100vh;
            background: url('eye-mask.jpg') no-repeat center center / cover;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .hero-content h1 {
            font-size: 3rem;
            margin: 0;
        }
        .hero-content p {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .btn {
            display: inline-block;
            background: #FFD700;
            color: #0A0A0F;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #FFC857;
        }
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            width: 80%;
            max-width: 400px;
        }
        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2rem;
            }
            .hero-content p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="particles"></div>
    <div class="hero-content">
        <h1>Infrared Heated Eye Mask</h1>
        <p>Smart Graphene Heating for a Better Sleep</p>
        <a href="#" class="btn">Buy Now</a>
    </div>
</div>

<div class="modal" id="modal">
    <div class="glassmorphism modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2>Buy Now</h2>
        <p>Complete your purchase details here.</p>
        <!-- Purchase form goes here -->
    </div>
</div>
